<!DOCTYPE html>
<html lang="th">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>โรงเรียนบ้านหนองแสง - รางวัล</title>
		<link rel="icon" type="image/x-icon" href="https://school.nongkhai2.go.th/emis/pic_school/1035430040.jpg">
		
		<!-- Google Font Sarabun -->
		<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
		
		<!-- Tailwind CSS CDN -->
		<script src="https://cdn.tailwindcss.com"></script>
		
		<style>
			body { font-family: 'Sarabun', sans-serif; }
		</style>
	</head>
	
	<body class="bg-gradient-to-br from-blue-100 via-sky-100 to-blue-200 min-h-screen">
		
		<!-- Header -->
		<header class="text-center py-6">
			<img src="https://nongyoenq.github.io/NongsangSchool-SendTasks/NongsangSchool-LOGO1-ver.png" alt="logo" class="mx-auto w-96 mb-6">
			<h1 class="text-3xl font-semibold text-blue-800">โรงเรียนบ้านหนองแสง</h1>
			<h2 class="text-xl text-blue-600">🏆 รางวัลและเกียรติบัตรต่างๆ 🎉</h2>
			<h3 class="text-sm text-gray-600">สพป. ยโสธร เขต 1</h3>
		</header>
		
		<!-- Controls -->
		<div class="max-w-6xl mx-auto px-4 mb-6">
			<div class="flex flex-col md:flex-row gap-3">
				<a href="index.html" class="px-4 py-2 bg-blue-500 text-white rounded-xl hover:bg-blue-600 text-center">⬅️ ย้อนกลับ</a>
				
				<input id="searchInput" type="text" placeholder="🔍 ค้นหา..."
				class="flex-1 px-4 py-2 rounded-xl border focus:outline-none focus:ring-2 focus:ring-blue-400">
				
				<select id="filterType" class="px-4 py-2 rounded-xl border">
					<option value="all">ทั้งหมด</option>
					<option value="image">เฉพาะรูปภาพ</option>
					<option value="pdf">เฉพาะ PDF</option>
				</select>
				
			</div>
		</div>
		
		<!-- Gallery -->
		<div id="gallery" class="max-w-6xl mx-auto px-4 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
		</div>
		
		<!-- Footer -->
		<footer class="text-center py-6 mt-10 text-gray-700 font-semibold">
			2026 COPYRIGHT Powered by bayoenq
		</footer>
		
		<script>
			// ⚠️ IMPORTANT:
			// Browser ปกติไม่สามารถอ่านไฟล์ในเครื่องได้โดยตรง
			// วิธีนี้ใช้ร่วมกับ "file list" ที่เรากำหนดเอง
			
			const files = [
			{ path: "files/certificate-นักเรียน-ระดับเขต.pdf", name: "รางวัลงานศิลปหัตถกรรมนักเรียน ระดับเขตพื้นที่การศึกษา ครั้งที่ 73 ประจำปีการศึกษา 2568" },
			{ path: "files/certificate-นักเรียน ศิลปหัตถกรรม ครั้งที่ 73 เครือข่าย.pdf", name: "รางวัลงานศิลปหัตถกรรมนักเรียน ระดับเครือข่ายคุณภาพการศึกษาเจ้าเสด็จ ครั้งที่ 73 ประจำปีการศึกษา 2568" },
			{ path: "files/054_2-เกียรติบัตรการประกวด_Page_08.jpg", name: "รางวัลเข้าร่วมการประกวดตราสัญลักษณ์ (Logo) โครงการการแข่งขันศิลปหัตถกรรมนักเรียน ครั้งที่ 73 ปีการศึกษา 2568 ระดับเขตพื้นที่การศึกษา ปีงบประมาณ พ.ศ. 2569" },
			{ path: "files/651_เกียรติบัตร Onet2567-2.jpg", name: "เป็นสถานศึกษาที่มีจำนวนนักเรียนได้คะแนนการทดสอบทางการศึกษาระดับชาติขั้นพื้นฐาน (O-NET) ปีการศึกษา 2567 รายวิชาวิทยาศาสตร์ ระดับชั้นประถมศึกษาปีที่ 6 ตั้งแต่ร้อยละ 50 ขึ้นไป มากกว่าครึ่งหนึ่งของจำนวนนักเรียนที่เข้าสอบ" },
			{path: "files/2568-ร2-19949.jpg", name: "ได้รับการคัดเลือกให้เป็นโรงเรียนต้นแบบ “สุขาดี มีความสุข” ประจำปี 2568 (ระยะที่ 2)"},
			{ path: "files/ระดับปฐมศึกษา-8.jpg", name: "รางวัลระดับเหรียญทอง การตัดสินการประกวดสื่อสร้างสรรค์ คลิปวิดีโอสั้น สื่อสารแรงบันดาลใจ สืบสาน ต่อยอดความดีที่ยั่งยืน ภายใต้หัวข้อ “วิถีเด็กไทย น้อมนำพระบรมราโชบายสู่การปฏิบัติ ปี 2568” ระดับปฐมวัย" },
			{ path: "files/ระดับประถมศึกษา-18.jpg", name: "รางวัลระดับเหรียญทอง การตัดสินการประกวดสื่อสร้างสรรค์ คลิปวิดีโอสั้น สื่อสารแรงบันดาลใจ สืบสาน ต่อยอดความดีที่ยั่งยืน ภายใต้หัวข้อ “วิถีเด็กไทย น้อมนำพระบรมราโชบายสู่การปฏิบัติ ปี 2568” ระดับประถมศึกษา" },
			{ path: "files/ITA Online-50.jpg", name: "ได้รับการประเมินคุณธรรมและความโปร่งใสในการดำเนินงานของสถานศึกษาออนไลน์ (ITA Online) ผลการประเมิน 97.45 คะแนน ระดับผลการประเมิน ผ่านดีเยี่ยม ตามโครงการเสริมสร้างคุณธรรม จริยธรรมและธรรมาภิบาลในสถานศึกษา ประจำปีงบประมาณ พ.ศ. 2568" },
			{ path: "files/รักไท-total.pdf", name: "โครงการ “รักษ์ภาษาไทย เนื่องในสัปดาห์วันภาษาไทยแห่งชาติ ประจำปี 2568” ระดับเครือข่ายคุณภาพการศึกษาเจ้าเสด็จ" },
			{ path: "files/SDT2025-Certificate6651-ลูกเสือ2568.png", name: "สนับสนุนและเข้าร่วมพิธีงานวันคล้ายวันสถาปนาคณะลูกเสือแห่งชาติ ประจำปี 2568" },
			{ path: "files/อีสาน เกียรติบัตร รร.ต้นแบบ สุขาดี มีความสุข 68-993.jpg", name: "ได้รับการคัดเลือกให้เป็นโรงเรียนต้นแบบ “สุขาดี มีความสุข” ประจำปี 2568" },
			{ path: "files/หนองแสง-2-ศิลปะหัถกรรมครั้งที่ 72-ปี2567.pdf", name: "รางวัลงานศิลปหัตถกรรมนักเรียน ระดับเครือข่ายคุณภาพการศึกษาเจ้าเสด็จ ครั้งที่ 72 ประจำปีการศึกษา 2567" },
			{ path: "files/เกียรติบัตร ประกวดสื่อสร้างสรรค์ (ประถมศึ-50.png", name: "ได้รับรางวัลระดับดี การประกวดสื่อสร้างสรรค์ คลิปวิดีโอสั้น สื่อสารแรงบันดาลใจ สืบสาน ต่อยอดความดีที่ยั่งยืน ภายใต้หัวข้อ “วิถีเด็กไทย น้อมนำพระบรมราโชบายสู่การปฏิบัติ ปี 2567” ระดับประถมศึกษา" },
			];
			
			const gallery = document.getElementById('gallery');
			const searchInput = document.getElementById('searchInput');
			const filterType = document.getElementById('filterType');
			
			function renderGallery() {
				gallery.innerHTML = '';
				
				const keyword = searchInput.value.toLowerCase();
				const type = filterType.value;
				
				files.forEach(item => {
					const file = item.path;
					const name = item.name;
					const lower = file.toLowerCase();
					
					const isImage = lower.match(/\.(jpg|jpeg|png|gif)$/);
					const isPDF = lower.endsWith('.pdf');
					
					if (type === 'image' && !isImage) return;
					if (type === 'pdf' && !isPDF) return;
					
					if (!name.includes(keyword)) return;
					
					const card = document.createElement('div');
					card.className = "bg-white rounded-2xl shadow hover:shadow-lg transition p-2";
					
					if (isImage) {
						card.innerHTML = `
						<img src="${file}" class="rounded-xl w-full h-40 object-cover cursor-pointer" onclick="openFile('${file}')">
						<p class="text-sm mt-2 text-center">📷 ${name}</p>
						`;
						} else if (isPDF) {
						card.innerHTML = `
						<div class="relative">
						<iframe 
						src="${file}#page=1&zoom=fit" 
						class="rounded-xl w-full h-40 border cursor-pointer"
						onclick="openFile('${file}')">
						</iframe>
						
						<!-- Overlay กันคลิก iframe โดยตรง -->
						<div onclick="openFile('${file}')"
						class="absolute inset-0 bg-black/0 hover:bg-black/10 rounded-xl cursor-pointer">
						</div>
						</div>
						
						<p class="text-sm mt-2 text-center">📄 ${name}</p>
						`;
					}
					
					gallery.appendChild(card);
				});
			}
			
			function openFile(file) {
				window.open(file, '_blank');
			}
			
			searchInput.addEventListener('input', renderGallery);
			filterType.addEventListener('change', renderGallery);
			
			renderGallery();
		</script>
		
	</body>
</html>
